<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Reams Family Creations</title>
  <meta name="description" content="Photo gallery of handcrafted wood pieces — cutting boards, tables, key holders, wall art, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-spacer" aria-hidden="true"></div>
    <a href="/" class="logo-link logo-link--center" aria-label="Reams Family Creations home">
      <img src="images/logo.png" alt="Reams Family Creations" class="logo-img">
    </a>
    <nav class="header-nav" aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    <section class="gallery-section" aria-labelledby="gallery-heading">
      <h1 id="gallery-heading" class="section-title">Our Work</h1>
      <p class="text-center" style="max-width: 560px; margin: 0 auto 2rem; color: var(--brown-600);">
        A selection of handcrafted pieces we’ve made. Want something similar or custom? <a href="contact.html">Get in touch</a>.
      </p>

      <div class="gallery-grid">
        <figure class="gallery-item">
          <img src="images/chef-cutting-board-stripes-juice-groove.png" alt="Chef knife cutting board with striped hardwoods">
          <figcaption>Chef knife cutting board</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/cribbage-board-washington.png" alt="Washington state-shaped cribbage board">
          <figcaption>Washington cribbage board</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/cribbage-board-idaho.png" alt="Idaho state-shaped cribbage board">
          <figcaption>Idaho cribbage board</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/foyer-table-beach-angle.png" alt="Beach-themed epoxy river foyer table">
          <figcaption>Beach-themed foyer table</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/idaho-key-holder-variations-group.png" alt="Idaho home sweet home key holders">
          <figcaption>Idaho key holders</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/silver-maple-foyer-table-angle.png" alt="Silver maple demilune side table">
          <figcaption>Silver maple foyer table</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/wildlife-cutting-board-full.png" alt="Square wildlife cutting board">
          <figcaption>Wildlife cutting board (13 × 12)</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/wildlife-walnut-cutting-board-22x13-wide.png" alt="Walnut wildlife cutting board">
          <figcaption>Wildlife cutting board (22 × 13)</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/rustic-board.png" alt="Striped walnut board with deer inlay">
          <figcaption>Inlaid serving board</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="images/cribbage-board-classic-rectangular.png" alt="Classic rectangular cribbage board">
          <figcaption>Classic cribbage board</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <img src="images/logo.png" alt="" class="footer-logo" aria-hidden="true">
    <p class="footer-text">Reams Family Creations — Handcrafted by our family, for yours.</p>
    <p class="footer-text"><a href="contact.html">Contact</a> · <a href="gallery.html">Gallery</a> · <a href="about.html">About</a></p>
  </footer>
</body>
</html>
